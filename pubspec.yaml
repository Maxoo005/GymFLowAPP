name: gymapp
description: "GymLoom – Track your workouts, crush your goals."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  shared_preferences: ^2.3.3
  uuid: ^4.5.1
  flutter_local_notifications: ^17.1.2
  sqflite: ^2.3.0
  path: ^1.9.0
  share_plus: ^10.1.3
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

# Konfiguracja dla flutter_launcher_icons do podmiany logo aplikacji
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
